<!DOCTYPE html>
<html>
<head>
    <title>Online Vegetable Store</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>🥕 Fresh Vegetable Store</h1>
    <p>Select your vegetables and place an order!</p>

    <div class="container">

        <!-- Tomato -->
        <div class="item">
            <h2>Tomato</h2>
            <img src="https://images.unsplash.com/photo-1546094096-0df4bcaaa337?w=400" alt="Tomato">
            <p>Price: ₹30/kg</p>
            <button onclick="order('Tomato')">Order</button>
        </div>

        <!-- Potato -->
        <div class="item">
            <h2>Potato</h2>
            <img src="https://images.unsplash.com/photo-1518977676601-b53f82aba655?w=400" alt="Potato">
            <p>Price: ₹25/kg</p>
            <button onclick="order('Potato')">Order</button>
        </div>

        <!-- Carrot -->
        <div class="item">
            <h2>Carrot</h2>
            <img src="https://images.unsplash.com/photo-1447175008436-054170c2e979?w=400" alt="Carrot">
            <p>Price: ₹40/kg</p>
            <button onclick="order('Carrot')">Order</button>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
